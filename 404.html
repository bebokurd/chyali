<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, follow" />
    <title>404 - Spatial Link Lost | Cydia Elite</title>
    <meta name="description" content="The spatial coordinate you're looking for doesn't exist in the Cydia Elite registry." />
    
    <!-- Open Graph for Shared Broken Links -->
    <meta property="og:title" content="404 - Spatial Link Lost | Cydia Elite" />
    <meta property="og:description" content="The coordinate you are attempting to reach does not exist in the spatial registry." />
    <meta property="og:image" content="https://i.pinimg.com/1200x/eb/48/73/eb487359acc13ab1ad5e1918e14cd49e.jpg" />
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #030712;
            color: #fff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* === Background Layers === */
        .video-background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: -3;
            opacity: 0.5;
            filter: brightness(0.4) saturate(1.4) blur(3px);
        }

        .video-overlay {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 50% 40%, transparent 0%, rgba(3, 7, 18, 0.7) 60%, rgba(3, 7, 18, 0.95) 100%),
                linear-gradient(180deg, transparent 0%, rgba(3, 7, 18, 0.4) 100%);
            z-index: -2;
        }

        /* Animated grid pattern */
        .grid-pattern {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image:
                linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridPulse 8s ease-in-out infinite;
        }

        @keyframes gridPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: orbDrift 12s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px; height: 400px;
            background: rgba(59, 130, 246, 0.12);
            top: -100px; right: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 300px; height: 300px;
            background: rgba(139, 92, 246, 0.08);
            bottom: -80px; left: -80px;
            animation-delay: -4s;
        }

        .orb-3 {
            width: 200px; height: 200px;
            background: rgba(59, 130, 246, 0.06);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -8s;
        }

        @keyframes orbDrift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -20px) scale(1.05); }
            50% { transform: translate(-20px, 30px) scale(0.95); }
            75% { transform: translate(10px, 10px) scale(1.02); }
        }

        /* === Main Content === */
        .scene {
            text-align: center;
            animation: sceneReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
            max-width: 560px;
            width: 90%;
            padding: 20px;
        }

        @keyframes sceneReveal {
            from { opacity: 0; transform: translateY(60px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Glitch icon */
        .icon-ring {
            width: 100px; height: 100px;
            border-radius: 28px;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 40px;
            position: relative;
            animation: iconFloat 5s ease-in-out infinite;
        }

        .icon-ring::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 30px;
            background: conic-gradient(
                from 0deg,
                transparent 0%,
                var(--accent) 25%,
                transparent 50%,
                rgba(139, 92, 246, 0.6) 75%,
                transparent 100%
            );
            z-index: -1;
            animation: borderSpin 6s linear infinite;
            opacity: 0.5;
        }

        .icon-ring::after {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 29px;
            background: #030712;
            z-index: -1;
        }

        .icon-ring i {
            font-size: 2.2rem;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px var(--accent-glow));
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(2deg); }
        }

        @keyframes borderSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Error code */
        .error-code {
            font-size: clamp(7rem, 18vw, 10rem);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -6px;
            position: relative;
            margin-bottom: 10px;
            background: linear-gradient(
                180deg,
                #fff 0%,
                rgba(255, 255, 255, 0.6) 40%,
                rgba(255, 255, 255, 0.15) 100%
            );
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: codeGlitch 8s ease-in-out infinite;
        }

        .error-code::before {
            content: '404';
            position: absolute;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            font-size: inherit;
            font-weight: inherit;
            letter-spacing: inherit;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.15;
            filter: blur(30px);
            z-index: -1;
        }

        @keyframes codeGlitch {
            0%, 90%, 100% { transform: translate(0, 0); }
            92% { transform: translate(-3px, 1px); }
            94% { transform: translate(2px, -1px); }
            96% { transform: translate(-1px, 2px); }
            98% { transform: translate(3px, 0); }
        }

        /* Status indicator */
        .status-line {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 8px 18px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #f87171;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 24px;
            animation: statusPulse 3s ease-in-out infinite;
        }

        .status-dot {
            width: 6px; height: 6px;
            background: #ef4444;
            border-radius: 50%;
            animation: dotBlink 2s ease-in-out infinite;
        }

        @keyframes statusPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.1); }
            50% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
        }

        @keyframes dotBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        h2 {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .desc {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.45);
            line-height: 1.7;
            margin-bottom: 40px;
            max-width: 380px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, var(--accent), #2563eb);
            color: #fff;
            padding: 14px 30px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 30px rgba(59, 130, 246, 0.3);
            border: none;
            cursor: pointer;
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 16px 40px rgba(59, 130, 246, 0.45);
        }

        .btn-ghost {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: rgba(255, 255, 255, 0.7);
            padding: 14px 28px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid var(--glass-border);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .btn-ghost:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        /* Floating particles */
        .particles {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px; height: 2px;
            background: rgba(59, 130, 246, 0.5);
            border-radius: 50%;
            animation: particleFloat linear infinite;
        }

        @keyframes particleFloat {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        /* Scanline effect */
        .scanlines {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.03) 2px,
                rgba(0, 0, 0, 0.03) 4px
            );
        }

        /* Footer info */
        .footer-meta {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 0.72rem;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .footer-meta span { opacity: 0.4; }

        /* Responsive */
        @media (max-width: 480px) {
            .scene { padding: 10px; }
            .icon-ring { width: 80px; height: 80px; margin-bottom: 30px; }
            .icon-ring i { font-size: 1.8rem; }
            h2 { font-size: 1.3rem; }
            .desc { font-size: 0.85rem; }
            .btn-group { flex-direction: column; align-items: center; }
            .footer-meta { display: none; }
        }
    </style>
</head>
<body>

    <video class="video-background" autoplay muted loop playsinline>
        <source src="https://r2.guns.lol/66f828e9-e90a-48ff-b46b-4f064893c5b7.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>
    <div class="grid-pattern"></div>
    <div class="scanlines"></div>

    <!-- Ambient orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Floating particles -->
    <div class="particles" id="particles"></div>

    <!-- Main content -->
    <div class="scene">
        <div class="icon-ring">
            <i class="fas fa-satellite-dish"></i>
        </div>

        <h1 class="error-code">404</h1>

        <div class="status-line">
            <div class="status-dot"></div>
            Signal Not Found
        </div>

        <h2>Spatial Link Lost</h2>
        <p class="desc">The coordinate you're attempting to reach does not exist in the Cydia Elite spatial registry.</p>

        <div class="btn-group">
            <a href="index.html" class="btn-primary" id="btn-return">
                <i class="fas fa-arrow-left"></i>
                Return to Portal
            </a>
            <a href="javascript:history.back()" class="btn-ghost" id="btn-back">
                <i class="fas fa-rotate-left"></i>
                Go Back
            </a>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer-meta">
        <span>Cydia Elite</span>
        <span>·</span>
        <span>Spatial OS v4.0</span>
        <span>·</span>
        <span id="error-ts"></span>
    </div>

    <script>
        // Disable context menu
        document.addEventListener('contextmenu', e => e.preventDefault());

        // Generate floating particles
        const container = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = (8 + Math.random() * 16) + 's';
            p.style.animationDelay = -(Math.random() * 20) + 's';
            p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
            p.style.opacity = 0.2 + Math.random() * 0.5;
            container.appendChild(p);
        }

        // Error timestamp
        document.getElementById('error-ts').textContent =
            new Date().toISOString().replace('T', ' ').split('.')[0] + ' UTC';
    </script>
</body>
</html>
